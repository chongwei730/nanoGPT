experiment:
  name: tiny_staged_test
  train_script: train.py
  output_root: /users/9/chen8596/nanoGPT/exp_log/nanogpt_staged_test/runs
  target_family: GPT
  target_dataset: OpenWebText
  target_model_size: 124M
launch:
  mode: python
  nproc_per_node: auto
fixed_args:
  dataset: ../../../users/9/chen8596/nanoGPT/exp_log/nanogpt_staged_test/data/tiny_openwebtext
  device: cpu
  compile: false
  dtype: float32
  gradient_accumulation_steps: 1
  batch_size: 2
  block_size: 8
  n_layer: 1
  n_head: 1
  n_embd: 16
  dropout: 0.0
  bias: false
  weight_decay: 0.0
  eval_interval: 1
  log_interval: 1
  eval_iters: 1
  max_iters: 1
  warmup_iters: 0
  lr_decay_iters: 1
  min_lr: 0.0001
  always_save_checkpoint: false
hyperparameters:
  learning_rate:
    type: log_uniform
    range:
    - 0.0001
    - 0.0003
task:
  train_metric: train_loss
  test_metric: val_loss
  metric_mode: min
  max_running_time_per_trial_hours: 0.001
optuna:
  max_study_time_hours: 0.002
  max_study_time_hours_levels:
  - 0.001
  - 0.002
  pruning:
    enabled: false
checkpoint:
  save_last: true
