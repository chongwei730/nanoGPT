experiment:
  name: llama60m_muon_lr_search
  train_script: train_llama_muon.py
  train_config: config/train_llama_60m.py
  output_root: /scratch.global/chen8596/experiment_runs
  target_family: LLaMA
  target_dataset: C4
  target_model_size: 60M
  skip_table_validation: true

launch:
  mode: torchrun
  nproc_per_node: 4

fixed_args:
  dataset: c4
  dataset_config_name: en
  tokenizer_name: t5-base
  compile: true
  eval_interval: 200
  eval_iters: 20
  log_interval: 10
  always_save_checkpoint: true
  max_iters: 5000
  lr_decay_iters: 5000

hyperparameters:
  muon_lr:
    type: log_uniform
    range: [1.0e-6, 1.0e-1]

task:
  train_metric: train_loss
  test_metric: val_loss
  metric_mode: min
  num_iterations_per_trial: 5000
  max_running_time_per_trial_hours: 0.0

optuna:
  max_study_time_hours: 2.0
  pruning:
    enabled: true
    type: median
    n_startup_trials: 1
    n_warmup_steps: 1
    interval_steps: 1

checkpoint:
  save_last: true
