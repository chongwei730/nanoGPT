experiment:
  name: gpt124m_schedulefree_adam_lr_search
  train_script: train.py
  train_config: config/train_gpt2.py
  output_root: /work/nvme/bgop/cchen47/experiment_runs
  target_family: GPT
  target_dataset: OpenWebText
  target_model_size: 124M

launch:
  mode: torchrun
  nproc_per_node: 4

fixed_args:
  dataset: openwebtext
  compile: false
  eval_interval: 200
  eval_iters: 20
  log_interval: 10
  always_save_checkpoint: true
  max_iters: 5000
  optimizer_type: AdamWScheduleFree
  decay_lr: false

hyperparameters:
  learning_rate:
    type: log_uniform
    range: [1.0e-5, 1.0e-3]

task:
  train_metric: train_loss
  test_metric: val_loss
  metric_mode: min
  num_iterations_per_trial: 5000
  max_running_time_per_trial_hours: 0.0

optuna:
  max_study_time_hours: 15.0
  pruning:
    enabled: true
    type: median
    n_startup_trials: 1
    n_warmup_steps: 1
    interval_steps: 1

checkpoint:
  save_last: true
