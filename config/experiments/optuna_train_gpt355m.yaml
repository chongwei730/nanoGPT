experiment:
  name: gpt355m_lr_search
  train_script: train.py
  train_config: config/train_gpt2_355m_7b.py
  output_root: experiment_runs
  target_family: GPT
  target_dataset: OpenWebText
  target_model_size: 355M

launch:
  mode: torchrun
  nproc_per_node: 4

fixed_args:
  dataset: openwebtext
  compile: false
  wandb_log: false
  eval_interval: 200
  eval_iters: 20
  log_interval: 10
  always_save_checkpoint: true
  max_iters: 13600
  lr_decay_iters: 13600

hyperparameters:
  learning_rate:
    type: log_uniform
    range: [1.0e-5, 1.0e-3]

task:
  train_metric: train_loss
  test_metric: val_loss
  metric_mode: min
  num_iterations_per_trial: 13600
  max_running_time_per_trial_hours: 0.0

optuna:
  max_study_time_hours: 120.0
  num_rungs: 3
  pruning:
    enabled: true
    type: median
    n_startup_trials: 1
    n_warmup_steps: 1
    interval_steps: 1

wandb:
  enabled: true
  project: owt
  run_name_prefix: gpt355m_lr_search

checkpoint:
  save_last: true
