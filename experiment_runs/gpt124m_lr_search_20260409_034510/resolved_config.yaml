experiment:
  name: gpt124m_lr_search
  train_script: train.py
  output_root: experiment_runs
  target_family: GPT
  target_dataset: OpenWebText
  target_model_size: 124M
launch:
  mode: torchrun
  nproc_per_node: auto
fixed_args:
  dataset: openwebtext
  compile: false
  wandb_log: false
  eval_interval: 200
  eval_iters: 20
  log_interval: 10
  always_save_checkpoint: true
  max_iters: 10000
hyperparameters:
  learning_rate:
    type: log_uniform
    range:
    - 1.0e-05
    - 0.001
task:
  train_metric: train_loss
  test_metric: val_loss
  metric_mode: min
  train_target: 3.11
  test_target: 3.12
  max_running_time_per_trial_hours: 3.0
optuna:
  max_study_time_hours: 15.0
  pruning:
    enabled: true
    type: median
    n_startup_trials: 1
    n_warmup_steps: 1
    interval_steps: 1
wandb:
  enabled: true
  project: owt
  run_name_prefix: gpt124m_lr_search
checkpoint:
  save_last: true
